<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Không gian sắc màu ✨ — Cloyveh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════
   ROOT & RESET (ÉP GIA TỐC MƯỢT MÀ)
══════════════════════════════════ */
*, *::before, *::after { 
  box-sizing: border-box; margin: 0; padding: 0; 
  -webkit-tap-highlight-color: transparent; /* Triệt tiêu chớp đen trên Mobile */
}
:root {
  --silk:   cubic-bezier(0.2, 0.8, 0.2, 1); /* Đường cong mượt hơn bản cũ */
  --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --snap:   cubic-bezier(0.4, 0.0, 0.2, 1);
  --dur:    0.35s; /* Tốc độ phản hồi nhanh hơn 0.05s */
  --glass-bg:     rgba(255,255,255,0.22);
  --glass-border: rgba(255,255,255,0.45);
  --glass-shadow: 0 8px 40px rgba(180,140,220,0.18), 0 2px 12px rgba(0,0,0,0.06);
  --ink:    #3d2c6e;
  --ink2:   #5e4a8a;
  --ink3:   #8b7ab5;
}

html, body {
  width: 100%; min-height: 100%;
  font-family: 'Nunito', sans-serif;
  overflow-x: hidden;
  overscroll-behavior-y: none; /* Cuộn mượt không bị nảy lò xo trình duyệt */
}

/* ══════════════════════════════════
   ANIMATED GRADIENT BODY
══════════════════════════════════ */
body {
  background: linear-gradient(
    135deg,
    #e8d5f5 0%,
    #d4eef7 20%,
    #fce4ec 40%,
    #e0f4f0 60%,
    #ede0f9 80%,
    #fbe8d8 100%
  );
  background-size: 400% 400%;
  animation: bodyGrad 20s ease infinite;
  position: relative;
  will-change: background-position;
}

@keyframes bodyGrad {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ══════════════════════════════════
   FLOATING BACKGROUND ORBS (GPU ACCELERATED)
══════════════════════════════════ */
.orb {
  position: fixed; border-radius: 50%;
  pointer-events: none; z-index: 0;
  filter: blur(70px);
  animation: orbFloat 20s ease-in-out infinite alternate;
  will-change: transform;
  transform: translateZ(0); /* Ép GPU xử lý */
}
.orb-1 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(192,150,245,0.28) 0%, transparent 70%);
  top: -100px; left: -100px;
  animation-duration: 22s;
}
.orb-2 {
  width: 350px; height: 350px;
  background: radial-gradient(circle, rgba(129,216,207,0.25) 0%, transparent 70%);
  bottom: -80px; right: -80px;
  animation-duration: 26s;
  animation-delay: -5s;
}
.orb-3 {
  width: 280px; height: 280px;
  background: radial-gradient(circle, rgba(248,180,210,0.22) 0%, transparent 70%);
  top: 40%; left: 60%;
  animation-duration: 30s;
  animation-delay: -10s;
}
@keyframes orbFloat {
  0%   { transform: translate3d(0,0,0) scale(1); }
  50%  { transform: translate3d(30px,-20px,0) scale(1.05); }
  100% { transform: translate3d(-20px,30px,0) scale(0.95); }
}

/* ══════════════════════════════════
   PAGE LAYOUT
══════════════════════════════════ */
.page-wrap {
  position: relative; z-index: 10;
  min-height: 100dvh;
  display: flex; flex-direction: column;
  align-items: center;
  padding: clamp(20px, 5vw, 48px) clamp(14px, 4vw, 24px) 48px;
  gap: 0;
}

/* ══════════════════════════════════
   BACK BUTTON (SMOOTH HOVER)
══════════════════════════════════ */
.btn-back {
  align-self: flex-start;
  display: flex; align-items: center; gap: 7px;
  padding: 10px 20px;
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1.5px solid var(--glass-border);
  border-radius: 50px;
  color: var(--ink2); font-weight: 800;
  font-size: 0.88rem;
  cursor: pointer;
  box-shadow: var(--glass-shadow);
  transition: all var(--dur) var(--silk);
  letter-spacing: 0.01em;
  margin-bottom: 28px;
  transform: translateZ(0);
  will-change: transform, box-shadow;
}
.btn-back:hover {
  background: rgba(255,255,255,0.38);
  transform: translate3d(-4px, 0, 0);
  box-shadow: 0 12px 40px rgba(180,140,220,0.25);
}
.btn-back:active {
  transform: scale(0.94) translateZ(0);
  transition: transform 0.05s var(--snap);
}

/* ══════════════════════════════════
   HEADER
══════════════════════════════════ */
.page-header {
  text-align: center;
  margin-bottom: 32px;
  animation: fadeDown 0.7s var(--silk) both;
  will-change: opacity, transform;
}
@keyframes fadeDown {
  from { opacity: 0; transform: translate3d(0, -18px, 0); }
  to   { opacity: 1; transform: translate3d(0, 0, 0); }
}

.header-emoji {
  font-size: clamp(2.4rem, 8vw, 3.4rem);
  display: block;
  margin-bottom: 10px;
  filter: drop-shadow(0 4px 18px rgba(192,150,245,0.45));
  animation: floatEmoji 5s ease-in-out infinite;
  transform: translateZ(0);
}
@keyframes floatEmoji {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-8px); }
}

.page-title {
  font-family: 'Quicksand', sans-serif;
  font-size: clamp(1.55rem, 5.5vw, 2.2rem);
  font-weight: 700;
  background: linear-gradient(135deg, #9b59d4, #5cb8e4, #e57bb2);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-size: 200% auto;
  animation: shimmerText 6s linear infinite;
  letter-spacing: -0.01em;
  line-height: 1.2;
  margin-bottom: 10px;
}
@keyframes shimmerText {
  0%   { background-position: 0% center; }
  100% { background-position: 200% center; }
}

.page-sub {
  color: var(--ink3);
  font-size: clamp(0.88rem, 3vw, 1.02rem);
  font-weight: 600;
  opacity: 0.9;
  max-width: 340px;
  margin: 0 auto;
  line-height: 1.55;
}

/* ══════════════════════════════════
   MAIN CARD
══════════════════════════════════ */
.main-card {
  width: 100%; max-width: 520px;
  background: var(--glass-bg);
  backdrop-filter: blur(36px) saturate(1.6);
  -webkit-backdrop-filter: blur(36px) saturate(1.6);
  border: 1.5px solid var(--glass-border);
  border-radius: 32px;
  padding: clamp(22px, 5vw, 36px) clamp(18px, 4.5vw, 32px);
  box-shadow: var(--glass-shadow), inset 0 1px 0 rgba(255,255,255,0.6);
  animation: fadeUp 0.65s var(--silk) 0.1s both;
  will-change: opacity, transform;
  transform: translateZ(0);
}
@keyframes fadeUp {
  from { opacity: 0; transform: translate3d(0, 24px, 0); }
  to   { opacity: 1; transform: translate3d(0, 0, 0); }
}

/* ══════════════════════════════════
   COLOR INPUTS SECTION
══════════════════════════════════ */
.inputs-section {
  display: flex; flex-direction: column; gap: 14px;
  margin-bottom: 22px;
}

.input-group { display: flex; flex-direction: column; gap: 5px; }
.input-label {
  font-size: 0.78rem; font-weight: 800;
  color: var(--ink3);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding-left: 4px;
  transition: color var(--dur) var(--silk);
}
.input-row { display: flex; align-items: center; gap: 10px; }

.color-dot {
  flex-shrink: 0;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(200,180,230,0.3);
  border: 2px solid rgba(255,255,255,0.7);
  box-shadow: 0 2px 10px rgba(180,140,220,0.2);
  transition: all var(--dur) var(--silk);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.8rem;
  overflow: hidden;
  transform: translateZ(0);
}
.color-dot.empty::after { content: '＋'; color: var(--ink3); font-weight: 900; }

.hex-input {
  flex: 1;
  background: rgba(255,255,255,0.38);
  backdrop-filter: blur(12px);
  border: 2px solid rgba(200,170,240,0.4);
  border-radius: 16px;
  padding: 12px 16px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.97rem; font-weight: 700;
  color: var(--ink);
  outline: none;
  transition: all var(--dur) var(--silk);
  letter-spacing: 0.03em;
  transform: translateZ(0); /* Anti-jitter khi gõ */
}
.hex-input::placeholder { color: var(--ink3); opacity: 0.65; font-weight: 600; }
.hex-input:focus {
  border-color: rgba(155,89,212,0.6);
  background: rgba(255,255,255,0.58);
  box-shadow: 0 0 0 4px rgba(192,150,245,0.18), 0 4px 20px rgba(155,89,212,0.1);
}
.hex-input.active-target {
  border-color: rgba(91,193,183,0.7);
  background: rgba(210,245,240,0.5);
  box-shadow: 0 0 0 4px rgba(91,193,183,0.2), 0 4px 20px rgba(91,193,183,0.12);
}

.clear-btn {
  flex-shrink: 0;
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(248,180,180,0.35);
  border: 1.5px solid rgba(248,113,113,0.35);
  color: #c07070;
  font-size: 0.85rem; font-weight: 900;
  cursor: pointer;
  transition: all var(--dur) var(--silk);
  display: flex; align-items: center; justify-content: center;
  transform: translateZ(0);
}
.clear-btn:hover { background: rgba(248,113,113,0.45); color: #8b0000; }
.clear-btn:active { transform: scale(0.86) translateZ(0); transition: transform 0.05s var(--snap); }

/* ══════════════════════════════════
   "XEM THÊM KO 🥰" BUTTON
══════════════════════════════════ */
.btn-explore {
  width: 100%;
  padding: 15px 24px;
  background: linear-gradient(135deg, rgba(230,200,255,0.55), rgba(200,235,255,0.5), rgba(255,210,235,0.48));
  backdrop-filter: blur(18px);
  border: 1.5px solid rgba(200,170,240,0.5);
  border-radius: 20px;
  font-family: 'Nunito', sans-serif;
  font-size: clamp(0.95rem, 3.2vw, 1.05rem);
  font-weight: 900;
  color: var(--ink);
  cursor: pointer;
  transition: all var(--dur) var(--silk);
  box-shadow: 0 4px 20px rgba(192,150,245,0.15), inset 0 1px 0 rgba(255,255,255,0.5);
  display: flex; align-items: center; justify-content: center; gap: 8px;
  letter-spacing: 0.01em;
  position: relative;
  overflow: hidden;
  transform: translateZ(0);
  will-change: transform, box-shadow;
}
.btn-explore::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(105deg, transparent 35%, rgba(255,255,255,0.25) 50%, transparent 65%);
  background-size: 200% 100%; background-position: -100% 0;
  transition: background-position 0.6s var(--silk);
  pointer-events: none;
}
.btn-explore:hover::after { background-position: 200% 0; }
.btn-explore:hover {
  background: linear-gradient(135deg, rgba(230,200,255,0.72), rgba(200,235,255,0.65), rgba(255,210,235,0.65));
  box-shadow: 0 8px 32px rgba(192,150,245,0.28);
  transform: translate3d(0, -2px, 0);
}
.btn-explore:active { transform: scale(0.96) translateZ(0); transition: transform 0.05s var(--snap); }
.explore-arrow { display: inline-block; transition: transform var(--dur) var(--silk); font-style: normal; }
.btn-explore.open .explore-arrow { transform: rotate(180deg); }

/* ══════════════════════════════════
   COLOR VAULT (CSS GRID HACK - SIÊU MƯỢT)
══════════════════════════════════ */
.color-vault-wrapper {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows 0.5s var(--silk), opacity 0.4s var(--silk), margin-top 0.4s var(--silk);
  opacity: 0;
  margin-top: 0;
  will-change: grid-template-rows, opacity, margin-top;
}
.color-vault-wrapper.open {
  grid-template-rows: 1fr;
  opacity: 1;
  margin-top: 20px;
}
.color-vault-inner {
  overflow: hidden; /* Cực kỳ quan trọng để Grid hoạt động mượt */
}

/* Category Tabs */
.cat-tabs {
  display: flex; flex-wrap: wrap; gap: 7px;
  margin-bottom: 18px; padding: 8px;
  background: rgba(255,255,255,0.28);
  border-radius: 18px;
  border: 1.5px solid rgba(255,255,255,0.4);
}
.cat-tab {
  padding: 8px 16px; border-radius: 50px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.84rem; font-weight: 800;
  border: 1.5px solid rgba(200,170,240,0.35);
  background: rgba(255,255,255,0.3);
  color: var(--ink2); cursor: pointer;
  transition: all var(--dur) var(--silk);
  white-space: nowrap;
  transform: translateZ(0);
}
.cat-tab:hover { background: rgba(255,255,255,0.55); transform: translate3d(0, -1px, 0); }
.cat-tab:active { transform: scale(0.92) translateZ(0); transition: transform 0.05s var(--snap); }
.cat-tab.active {
  background: linear-gradient(135deg, rgba(192,150,245,0.55), rgba(129,216,207,0.45));
  border-color: rgba(155,89,212,0.5);
  color: var(--ink);
  box-shadow: 0 4px 16px rgba(192,150,245,0.28);
}

/* Color Swatches Grid */
.swatches-grid { display: flex; flex-direction: column; gap: 9px; padding: 2px 0; }

.swatch-pill {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 18px; border-radius: 16px; cursor: pointer;
  border: 2px solid rgba(255,255,255,0.35);
  box-shadow: 0 3px 12px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.25);
  transition: all var(--dur) var(--silk);
  position: relative; overflow: hidden; min-height: 46px;
  transform: translateZ(0);
  will-change: transform, box-shadow;
}
.swatch-pill:hover {
  transform: translate3d(4px, 0, 0) scale(1.015);
  box-shadow: 0 6px 20px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.3);
  border-color: rgba(255,255,255,0.6);
}
.swatch-pill:active {
  transform: scale(0.92) translateZ(0) !important;
  transition: transform 0.05s var(--snap) !important;
}
.swatch-pill.just-picked { animation: pillPick 0.4s var(--spring); }
@keyframes pillPick {
  0%   { transform: scale(1) translateZ(0); }
  40%  { transform: scale(0.9) translateZ(0); }
  100% { transform: scale(1) translateZ(0); }
}

.swatch-hex {
  font-family: 'Quicksand', sans-serif;
  font-size: 0.88rem; font-weight: 700;
  letter-spacing: 0.06em; text-shadow: 0 1px 4px rgba(0,0,0,0.15);
}
.swatch-add-icon {
  font-size: 0.85rem; opacity: 0.75;
  transition: opacity var(--dur) var(--silk), transform var(--dur) var(--silk);
}
.swatch-pill:hover .swatch-add-icon { opacity: 1; transform: scale(1.2); }

/* ══════════════════════════════════
   HELPER TEXT
══════════════════════════════════ */
.target-hint {
  text-align: center; font-size: 0.8rem; font-weight: 700;
  color: rgba(91,193,183,0.95); padding: 8px 14px;
  background: rgba(210,245,240,0.45); border-radius: 12px;
  border: 1px solid rgba(91,193,183,0.3); margin-bottom: 12px;
  animation: fadeIn 0.3s var(--silk); display: none;
}
.target-hint.show { display: block; }

/* ══════════════════════════════════
   DIVIDER
══════════════════════════════════ */
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(192,150,245,0.4), transparent);
  margin: 20px 0;
}

/* ══════════════════════════════════
   ACTION BUTTONS
══════════════════════════════════ */
.actions { display: flex; gap: 12px; margin-top: 24px; }
.btn-save {
  flex: 1; padding: 16px 20px;
  background: linear-gradient(135deg, #a78bfa, #7c3aed, #5cb8e4);
  background-size: 200% auto; border: none; border-radius: 20px;
  font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 900;
  color: rgba(245,240,255,0.97); cursor: pointer;
  box-shadow: 0 6px 28px rgba(124,58,237,0.3), inset 0 1px 0 rgba(255,255,255,0.25);
  transition: all var(--dur) var(--silk); letter-spacing: 0.01em;
  animation: gradShift 5s ease infinite;
  transform: translateZ(0); will-change: transform, box-shadow;
}
.btn-save:hover { box-shadow: 0 10px 36px rgba(124,58,237,0.45); transform: translate3d(0, -2px, 0); }
.btn-save:active { transform: scale(0.95) translateZ(0); transition: transform 0.05s var(--snap); }

.btn-reset {
  padding: 16px 20px; background: rgba(255,255,255,0.3);
  backdrop-filter: blur(16px); border: 1.5px solid rgba(200,170,240,0.4);
  border-radius: 20px; font-family: 'Nunito', sans-serif;
  font-size: 0.88rem; font-weight: 800; color: var(--ink2);
  cursor: pointer; transition: all var(--dur) var(--silk); white-space: nowrap;
  transform: translateZ(0);
}
.btn-reset:hover { background: rgba(248,180,180,0.3); border-color: rgba(248,113,113,0.4); color: #991b1b; }
.btn-reset:active { transform: scale(0.93) translateZ(0); transition: transform 0.05s var(--snap); }

/* ══════════════════════════════════
   TOAST NOTIFICATION
══════════════════════════════════ */
.toast {
  position: fixed; bottom: 32px; left: 50%;
  transform: translateX(-50%) translate3d(0, 80px, 0);
  background: linear-gradient(135deg, rgba(255,255,255,0.92), rgba(240,230,255,0.9));
  backdrop-filter: blur(20px); border: 1.5px solid rgba(192,150,245,0.5);
  border-radius: 50px; padding: 12px 28px;
  font-weight: 800; font-size: 0.92rem; color: var(--ink);
  box-shadow: 0 8px 32px rgba(192,150,245,0.3); z-index: 999;
  transition: transform 0.5s var(--spring), opacity 0.4s var(--silk);
  opacity: 0; white-space: nowrap; will-change: transform, opacity;
}
.toast.show { transform: translateX(-50%) translate3d(0, 0, 0); opacity: 1; }

/* ══════════════════════════════════
   PREVIEW BAR
══════════════════════════════════ */
.preview-bar {
  width: 100%; height: 10px; border-radius: 10px;
  background: rgba(200,180,230,0.25); overflow: hidden; margin-bottom: 20px;
  border: 1px solid rgba(255,255,255,0.4); transition: all var(--dur) var(--silk);
}
.preview-fill {
  height: 100%; width: 100%;
  background: linear-gradient(90deg, #d4c5f0, #c5e4f0, #f0c5e0); background-size: 200% auto;
  transition: background 0.6s var(--silk); border-radius: 10px;
}

/* ══════════════════════════════════
   SECTION LABEL
══════════════════════════════════ */
.section-label {
  font-size: 0.76rem; font-weight: 900; color: var(--ink3);
  letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.section-label::before, .section-label::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(192,150,245,0.35));
}
.section-label::before { background: linear-gradient(270deg, transparent, rgba(192,150,245,0.35)); }

/* ══════════════════════════════════
   RESPONSIVE
══════════════════════════════════ */
@media (max-width: 420px) {
  .actions { flex-direction: column; }
  .btn-reset { order: 2; }
  .cat-tabs { gap: 5px; }
  .cat-tab { padding: 7px 13px; font-size: 0.8rem; }
}
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="page-wrap">
  <button class="btn-back" onclick="goBack()">← Quay về trang chính</button>

  <div class="page-header">
    <span class="header-emoji">🎨</span>
    <h1 class="page-title">Không gian sắc màu của bạn ✨</h1>
    <p class="page-sub">Hãy chọn những sắc thái làm bạn cảm thấy bình yên nhất nhé.</p>
  </div>

  <div class="main-card">
    <div class="preview-bar"><div class="preview-fill" id="previewFill"></div></div>
    <div class="section-label">✦ Bộ màu của bạn ✦</div>

    <div class="inputs-section" id="inputsSection">
      <div class="input-group" id="group-0">
        <label class="input-label" for="hex0">Màu chính của bạn</label>
        <div class="input-row">
          <div class="color-dot empty" id="dot-0" onclick="activateInput(0)"></div>
          <input class="hex-input active-target" id="hex0" placeholder="#ff9ecb  ·  màu đầu tiên nhé 🌸" maxlength="7" autocomplete="off" spellcheck="false" oninput="onHexInput(this,0)" onfocus="activateInput(0)">
          <button class="clear-btn" onclick="clearInput(0)" title="Xoá ô này">✕</button>
        </div>
      </div>
      <div class="input-group" id="group-1">
        <label class="input-label" for="hex1">Thêm chút sắc phụ</label>
        <div class="input-row">
          <div class="color-dot empty" id="dot-1" onclick="activateInput(1)"></div>
          <input class="hex-input" id="hex1" placeholder="#b0e0e6  ·  hoà sắc thứ hai 💙" maxlength="7" autocomplete="off" spellcheck="false" oninput="onHexInput(this,1)" onfocus="activateInput(1)">
          <button class="clear-btn" onclick="clearInput(1)" title="Xoá ô này">✕</button>
        </div>
      </div>
      <div class="input-group" id="group-2">
        <label class="input-label" for="hex2">Sắc thứ ba — thêm chiều sâu</label>
        <div class="input-row">
          <div class="color-dot empty" id="dot-2" onclick="activateInput(2)"></div>
          <input class="hex-input" id="hex2" placeholder="#e6e6fa  ·  sắc nền thứ ba 💜" maxlength="7" autocomplete="off" spellcheck="false" oninput="onHexInput(this,2)" onfocus="activateInput(2)">
          <button class="clear-btn" onclick="clearInput(2)" title="Xoá ô này">✕</button>
        </div>
      </div>
      <div class="input-group" id="group-3">
        <label class="input-label" for="hex3">Chút màu cuối — hoàn thiện bức tranh</label>
        <div class="input-row">
          <div class="color-dot empty" id="dot-3" onclick="activateInput(3)"></div>
          <input class="hex-input" id="hex3" placeholder="#ffdab9  ·  nốt cuối mềm mại 🍑" maxlength="7" autocomplete="off" spellcheck="false" oninput="onHexInput(this,3)" onfocus="activateInput(3)">
          <button class="clear-btn" onclick="clearInput(3)" title="Xoá ô này">✕</button>
        </div>
      </div>
    </div>

    <button class="btn-explore" id="btnExplore" onclick="toggleVault()">
      <span>Xem thêm ko 🥰</span>
      <i class="explore-arrow">↓</i>
    </button>

    <!-- WRAPPER SỬ DỤNG CSS GRID SIÊU MƯỢT -->
    <div class="color-vault-wrapper" id="colorVaultWrapper">
      <div class="color-vault-inner">
        <div class="divider"></div>
        <div class="section-label">✦ Kho màu theo cảm xúc ✦</div>
        <div class="target-hint" id="targetHint">💡 Đang điền vào ô <span id="hintTarget">1</span> — bấm ô khác để chuyển mục tiêu</div>
        <div class="cat-tabs" id="catTabs"></div>
        <div class="swatches-grid" id="swatchGrid"></div>
      </div>
    </div>

    <div class="divider"></div>
    <div class="actions">
      <button class="btn-save" onclick="saveAndGo()">💾 Lưu & Áp dụng ngay</button>
      <button class="btn-reset" onclick="resetDefault()">🔄 Mặc định</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">✨ Đã lưu!</div>

<script>
const COLOR_DATA = [
  { name: "Buồn 🌊", colors: ["#191970","#483D8B","#4682B4","#5F9EA0","#008080","#2F4F4F","#1E3A5F","#000080","#003366","#08457E","#3D59AB","#4169E1","#4B0082","#2E5894","#1034A6","#0047AB","#5D3FD3"] },
  { name: "Vui 🌟", colors: ["#FFD700","#FF8C00","#FF4500","#FF1493","#00FF00","#32CD32","#FFD1DC","#FF00FF","#00FA9A","#FF7F50","#FF69B4","#F4A460","#FF6347","#7CFC00","#00BFFF","#FFB6C1"] },
  { name: "Nhẹ nhàng 🌸", colors: ["#FFC0CB","#FFB7C5","#F4C2C2","#B0E0E6","#ADD8E6","#E6E6FA","#D8BFD8","#FFDAB9","#FFE4B5","#EEE8AA","#98FB98","#ACE1AF","#F08080","#BDB76B","#87CEFA","#BC8F8F"] },
  { name: "Yêu ❤️", colors: ["#FF0000","#E0115F","#FF1493","#FF69B4","#C71585","#DC143C","#B22222","#800000","#DA70D6","#FF007F","#FF3366","#E30B5D","#FF4D4D","#CD5C5C","#8B0000","#FF85A2"] },
  { name: "Học 📚", colors: ["#000080","#4682B4","#2E8B57","#8B4513","#DAA520","#5F9EA0","#483D8B","#708090","#A0522D","#228B22","#191970","#0047AB","#B8860B","#556B2F","#4169E1","#CD853F"] },
  { name: "Đêm 🌙", colors: ["#191970","#000080","#483D8B","#2F4F4F","#120A8F","#0000CD","#003366","#2C3E50","#301934","#311432","#1E1E2E","#232323","#343434","#4B0082","#0F0F0F","#1B1B1B"] },
  { name: "💍 Xa xỉ", colors: ["#FFD700","#C0C0C0","#B87333","#E5E4E2","#CFB53B","#D4AF37","#AF9B60","#FFDF00","#704214","#E6BE8A","#B76E79","#E2912B","#A67C00","#DAA520","#8E7618"] }
];

let activeTarget = 0, activeCat = 0, vaultOpen = false;

window.onload = function() { loadSavedColors(); buildTabs(); renderSwatches(0); updateAllDots(); updatePreview(); };

function loadSavedColors() {
  try {
    const saved = JSON.parse(localStorage.getItem('Cloyveh_Theme') || '[]');
    saved.forEach((hex, i) => { if (i < 4 && isValidHex(hex)) document.getElementById('hex' + i).value = hex; });
  } catch(e) {}
}

function buildTabs() {
  const container = document.getElementById('catTabs');
  COLOR_DATA.forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'cat-tab' + (i === 0 ? ' active' : '');
    btn.textContent = cat.name; btn.onclick = () => switchCat(i);
    container.appendChild(btn);
  });
}

function switchCat(idx) {
  activeCat = idx;
  document.querySelectorAll('.cat-tab').forEach((b, i) => b.classList.toggle('active', i === idx));
  renderSwatches(idx);
}

function renderSwatches(catIdx) {
  const grid = document.getElementById('swatchGrid'); grid.innerHTML = '';
  COLOR_DATA[catIdx].colors.forEach(hex => {
    const pill = document.createElement('div'); pill.className = 'swatch-pill'; pill.style.backgroundColor = hex;
    const brightness = hexBrightness(hex);
    const textColor = brightness > 145 ? 'rgba(30,20,60,0.82)' : 'rgba(255,255,255,0.9)';
    pill.innerHTML = `<span class="swatch-hex" style="color:${textColor}">${hex.toUpperCase()}</span><span class="swatch-add-icon" style="color:${textColor}">＋</span>`;
    pill.onclick = () => {
      requestAnimationFrame(() => pickColor(hex, pill)); // Tối ưu luồng vẽ JS
    };
    grid.appendChild(pill);
  });
}

function pickColor(hex, pillEl) {
  pillEl.classList.remove('just-picked'); void pillEl.offsetWidth; pillEl.classList.add('just-picked');
  let target = activeTarget;
  const inputs = ['hex0','hex1','hex2','hex3'].map(id => document.getElementById(id));
  if (inputs[target].value.trim() !== '') {
    let found = -1;
    for (let i = 0; i < 4; i++) { if (inputs[i].value.trim() === '') { found = i; break; } }
    if (found !== -1) { target = found; activeTarget = found; }
  }
  inputs[target].value = hex; onHexInput(inputs[target], target); advanceTarget(); updateHint();
  toast('🎨 Đã thêm ' + hex + ' vào ô ' + (target + 1) + '!');
}

function advanceTarget() {
  const inputs = ['hex0','hex1','hex2','hex3'].map(id => document.getElementById(id));
  for (let i = 0; i < 4; i++) { if (inputs[i].value.trim() === '') { setActiveTarget(i); return; } }
}

function activateInput(idx) { setActiveTarget(idx); updateHint(); }

function setActiveTarget(idx) {
  activeTarget = idx;
  document.querySelectorAll('.hex-input').forEach((inp, i) => inp.classList.toggle('active-target', i === idx));
}

function updateHint() {
  const hint = document.getElementById('targetHint'), span = document.getElementById('hintTarget');
  if (vaultOpen) { hint.classList.add('show'); span.textContent = activeTarget + 1; }
}

function toggleVault() {
  vaultOpen = !vaultOpen;
  const vault = document.getElementById('colorVaultWrapper'), btnExp = document.getElementById('btnExplore');
  vault.classList.toggle('open', vaultOpen); btnExp.classList.toggle('open', vaultOpen);
  updateHint(); if (!vaultOpen) document.getElementById('targetHint').classList.remove('show');
}

function onHexInput(input, idx) {
  let val = input.value.trim();
  if (val.length > 0 && val[0] !== '#') { val = '#' + val; input.value = val; }
  updateDot(idx, val); updatePreview();
}

function updateDot(idx, hex) {
  const dot = document.getElementById('dot-' + idx);
  if (isValidHex(hex)) {
    dot.style.backgroundColor = hex; dot.style.borderColor = hex;
    dot.classList.remove('empty'); dot.textContent = ''; dot.style.boxShadow = `0 3px 14px ${hex}66`;
  } else {
    dot.style.backgroundColor = ''; dot.style.borderColor = ''; dot.style.boxShadow = '';
    dot.classList.add('empty'); dot.textContent = '';
  }
}

function updateAllDots() { for (let i = 0; i < 4; i++) { updateDot(i, document.getElementById('hex' + i).value.trim()); } }

function updatePreview() {
  const fill = document.getElementById('previewFill'), cols = [];
  for (let i = 0; i < 4; i++) { const v = document.getElementById('hex' + i).value.trim(); if (isValidHex(v)) cols.push(v); }
  if (cols.length === 0) fill.style.background = 'linear-gradient(90deg, #d4c5f0, #c5e4f0, #f0c5e0)';
  else if (cols.length === 1) fill.style.background = `linear-gradient(90deg, ${cols[0]}cc, ${cols[0]}, ${cols[0]}cc)`;
  else fill.style.background = `linear-gradient(90deg, ${cols.join(', ')})`;
}

function clearInput(idx) { document.getElementById('hex' + idx).value = ''; updateDot(idx, ''); updatePreview(); setActiveTarget(idx); }

function saveAndGo() {
  const hexes = [];
  for (let i = 0; i < 4; i++) { const v = document.getElementById('hex' + i).value.trim(); if (v) hexes.push(v); }
  if (!hexes.length) return toast('💔 Chưa nhập màu nào nè bạn ơi...');
  const invalid = hexes.filter(h => !isValidHex(h));
  if (invalid.length) return toast('❌ Mã màu ' + invalid[0] + ' chưa đúng định dạng!');
  localStorage.setItem('Cloyveh_Theme', JSON.stringify(hexes));
  toast('💾 Lưu xong rồi! Đang về nhà... 🌸'); setTimeout(() => { location.href = 'index.html'; }, 900);
}

function goBack() { location.href = 'index.html'; }

function resetDefault() {
  if (!confirm('Về màu mặc định nhé? Bộ màu hiện tại sẽ mất đó 🥺')) return;
  localStorage.removeItem('Cloyveh_Theme'); toast('🌿 Đã về mặc định rồi nhé!'); setTimeout(() => { location.href = 'index.html'; }, 900);
}

function isValidHex(hex) { return /^#([0-9A-Fa-f]{3}|[0-9A-Fa-f]{6})$/.test(hex); }
function hexBrightness(hex) {
  const full = hex.length === 4 ? '#' + hex[1]+hex[1] + hex[2]+hex[2] + hex[3]+hex[3] : hex;
  return parseInt(full.slice(1,3),16) * 0.299 + parseInt(full.slice(3,5),16) * 0.587 + parseInt(full.slice(5,7),16) * 0.114;
}
function toast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2400);
}
</script>
</body>
</html>
