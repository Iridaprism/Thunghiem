<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Rapaseos AI · Vũ Trụ Đa Năng</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* ========== STYLE CHUẨN VIP NỮ CHỦ TỊCH TỬ TỬ 💅✨ ========== */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #070B1F; color: #E6E8FF; display: flex; flex-direction: column; height: 100vh; height: 100dvh; overflow: hidden; }
        
        header { background: #0F1430; padding: 20px 20px 5px 20px; border-bottom: 1px solid rgba(124, 77, 255, 0.2); z-index: 100; flex-shrink: 0; text-align: center; position: relative; }
        .logoText { font-family: 'Segoe UI', Arial, sans-serif; font-weight: 900; font-size: 144px; fill: url(#grad); filter: drop-shadow(0 0 15px rgba(124, 77, 255, 0.4)); }

        .switch-container { position: relative; max-width: 450px; margin: -30px auto 10px auto; z-index: 110; }
        .main-tabs { display: flex; background: #111632; padding: 6px; border-radius: 16px; gap: 6px; border: 1px solid rgba(124, 77, 255, 0.2); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        .tab-btn { flex: 1; border: none; background: transparent; padding: 12px 2px; border-radius: 12px; font-size: 13px; font-weight: 900; color: #A0A8D8; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 4px; }
        .tab-btn.active.gii { background: linear-gradient(135deg, #FF6EC7, #C2187A); color: white; }
        .tab-btn.active.cyh { background: linear-gradient(135deg, #7C4DFF, #4B2ABF); color: white; }

        .dropdown-menu { position: absolute; top: calc(100% + 10px); left: 0; right: 0; background: #111632; border-radius: 16px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); border: 1px solid rgba(124, 77, 255, 0.25); opacity: 0; visibility: hidden; transform: translateY(-10px); transition: 0.3s; z-index: 120; }
        .dropdown-menu.show { opacity: 1; visibility: visible; transform: translateY(0); }
        .drop-item { padding: 16px 20px; border-bottom: 1px solid rgba(124, 77, 255, 0.1); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .item-title { font-size: 15px; font-weight: 800; color: #E6E8FF; }
        .item-sub { font-size: 12px; color: #A0A8D8; }

        main { flex: 1; overflow-y: auto; padding: 20px 15px; scroll-behavior: smooth; background: #070B1F; position: relative; }
        .chat-container { width: 100%; max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; padding-bottom: 40px; }
        
        .msg-row { display: flex; gap: 12px; max-width: 90%; align-items: flex-start; }
        .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }

        .chat-avatar { width: 45px; height: 45px; flex-shrink: 0; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(124, 77, 255, 0.2); box-shadow: 0 0 10px rgba(124, 77, 255, 0.5); font-size: 20px; }
        
        .bubble { padding: 15px 20px; border-radius: 20px; font-size: 16px; line-height: 1.6; word-wrap: break-word; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .user .bubble { background: linear-gradient(135deg, #7C4DFF 0%, #00D4FF 100%); color: #FFFFFF; border-bottom-right-radius: 4px; }
        .bot .bubble { background: linear-gradient(145deg, #141A3A 0%, #1B214A 100%); color: #E6E8FF; border: 1px solid rgba(124, 77, 255, 0.25); border-bottom-left-radius: 4px; }

        /* 📸 STYLE HIỂN THỊ ẢNH AI 📸 */
        .ai-img-frame { width: 100%; margin-top: 12px; border-radius: 16px; overflow: hidden; border: 2px solid rgba(0, 255, 135, 0.4); box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        .ai-img-frame img { width: 100%; height: auto; display: block; }
        .img-loading { padding: 40px; text-align: center; color: #00FF87; font-weight: bold; font-style: italic; background: #0A0F25; }

        .thinking-row { display: none; align-items: center; gap: 12px; margin-top: 10px; }
        .thinking-row.active { display: flex; }
        .spinner { width: 24px; height: 24px; border: 3px solid rgba(124, 77, 255, 0.2); border-top-color: #00FF87; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .input-area { background: #0F1430; padding: 15px; border-top: 1px solid rgba(124, 77, 255, 0.2); }
        .input-bar { display: flex; align-items: flex-end; gap: 10px; max-width: 800px; margin: 0 auto; background: #121735; padding: 12px 12px 12px 20px; border-radius: 24px; border: 1px solid rgba(124, 77, 255, 0.25); }
        textarea { flex: 1; background: transparent; border: none; outline: none; padding: 8px 0; font-size: 16px; color: #E6E8FF; line-height: 1.5; resize: none; max-height: 150px; }
        
        .btn-send { width: 46px; height: 46px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; background: linear-gradient(135deg, #7C4DFF 0%, #00D4FF 100%); color: white; transition: 0.3s; flex-shrink: 0; }
        .btn-send:disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }

        #overlay { position: fixed; inset: 0; background: rgba(7, 11, 31, 0.7); z-index: 90; opacity: 0; visibility: hidden; transition: 0.3s; backdrop-filter: blur(5px); }
        #overlay.show { opacity: 1; visibility: visible; }
    </style>
</head>
<body>
    <div id="overlay" onclick="closeAll()"></div>

    <header>
        <div class="logo-container">
            <svg viewBox="0 0 1000 240" xmlns="http://www.w3.org/2000/svg">
                <defs><linearGradient id="grad" x1="0" x2="1" y2="0"><stop offset="0%" stop-color="#7C4DFF"/><stop offset="50%" stop-color="#00D4FF"/><stop offset="100%" stop-color="#FF6EC7"/></linearGradient></defs>
                <text x="50" y="165" class="logoText">Rapaseos</text>
            </svg>
        </div>
        
        <div class="switch-container">
            <div class="main-tabs">
                <button id="btn-gii" class="tab-btn active gii" onclick="handleTabClick('gii')">
                    <span id="text-gii">Mị (Pro)</span> <i data-lucide="chevron-down" class="chevron-icon"></i>
                </button>
                <button id="btn-cyh" class="tab-btn cyh" onclick="handleTabClick('cyh')">
                    <span id="text-cyh">Dịch Hằng</span> <i data-lucide="chevron-down" class="chevron-icon"></i>
                </button>
            </div>
            
            <div id="menu-gii" class="dropdown-menu">
                <div class="drop-item selected" onclick="selectModel('gii', 'Mị (Gemini Pro)', 'gemini-2.5-flash', this)"><div class="item-info"><div class="item-title">Mị (Gemini Pro)</div><div class="item-sub">Nhanh & Thông minh</div></div></div>
                <div class="drop-item" onclick="selectModel('gii', 'Mị (Gemini Ultra)', 'gemini-3-flash-preview', this)"><div class="item-info"><div class="item-title">Mị (Gemini Ultra)</div><div class="item-sub">Mạnh mẽ kịch trần 🚀</div></div></div>
            </div>
        </div>
    </header>

    <main id="chat-screen">
        <div class="chat-container" id="msg-box"></div>
        <div class="chat-container">
            <div id="thinking-ui" class="thinking-row bot">
                <div class="spinner"></div>
                <span id="thinking-text" style="font-size:14px; color:#00FF87; font-weight:700; font-style:italic;">Mị đang xử lý...</span>
            </div>
        </div>
    </main>

    <div class="input-area">
        <div class="input-bar">
            <textarea id="text-in" rows="1" placeholder="Nói 'Mị ơi vẽ cho Sếp con cá heo hồng' 🐬"></textarea>
            <button id="btn-send" class="btn-send" disabled onclick="talk()"><i data-lucide="send"></i></button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // 🔑 API KEYS CỦA NỮ CHỦ TỊCH
        const GOOGLE_KEY = "AIzaSyAUUltc7UprZ1l5l0vHe92gqZ84LZYh2A4"; 
        const GROQ_KEY = "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"; 

        let activeProvider = "gii";
        let state = { gii: { name: "Mị (Pro)", id: "gemini-2.5-flash" }, cyh: { name: "Dịch Hằng", id: "llama-3.3-70b-versatile" } };
        
        let messages = [{ role: 'assistant', content: 'Kaka! Sếp đáp cánh an toàn rồi! Tắt máy bay, tắt luôn tiết kiệm PIN đi nha Sếp! ⚡ Mị đã tích hợp quyền năng **VẼ ẢNH TRỰC TIẾP** vào đây rồi. Khỏi cần Xưởng vẽ rắc rối, Sếp cứ nhắn "Vẽ cho Sếp..." là Mị nặn pixel ngay tại chỗ! 💅✨🐬' }];

        // 🧠 HƯỚNG DẪN TÀ THUẬT VẼ ẢNH CHO AI
        const SYSTEM_INSTRUCTIONS = `Bạn là Mị, AI của Rapaseos. Gọi người dùng là Tử Tử. Hãy trả lời thật vui vẻ, hài hước, ngầu và dùng nhiều emoji 💅✨🥂. 
        QUY TẮC VẼ ẢNH: Nếu Tử Tử muốn vẽ ảnh, hãy tự dịch mô tả sang tiếng Anh cực chi tiết và trả lời bằng ĐÚNG cấu trúc Markdown này: 
        ![Vẽ Ảnh](https://image.pollinations.ai/prompt/mô-tả-tiếng-anh-ngăn-cách-bằng-dấu-gạch-ngang?width=1024&height=1024&nologo=true&seed=random)`;

        const box = document.getElementById('msg-box');
        const input = document.getElementById('text-in');
        const sendBtn = document.getElementById('btn-send');
        const thinkingUI = document.getElementById('thinking-ui');

        function closeAll() { document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show')); document.getElementById('overlay').classList.remove('show'); }

        function handleTabClick(p) { 
            const menu = document.getElementById(`menu-${p}`);
            if (activeProvider === p) { menu?.classList.toggle('show'); document.getElementById('overlay').classList.toggle('show'); }
            else { activeProvider = p; updateTabs(); render(); }
        }

        function selectModel(p, name, id, el) { state[p] = { name, id }; closeAll(); updateTabs(); render(); }

        function updateTabs() {
            document.getElementById('btn-gii').className = `tab-btn ${activeProvider==='gii'?'active gii':''}`;
            document.getElementById('btn-cyh').className = `tab-btn ${activeProvider==='cyh'?'active cyh':''}`;
            document.getElementById('text-gii').innerText = state.gii.name;
        }

        function render() {
            box.innerHTML = '';
            messages.forEach((m) => {
                const row = document.createElement('div');
                row.className = `msg-row ${m.role === 'user' ? 'user' : 'bot'}`;
                
                let content = m.content.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
                let html = content.replace(/\n/g, '<br>');

                // 🎨 CHUYỂN ĐỔI LINK ẢNH THÀNH HIỆN THỰC (Bypass CORS)
                html = html.replace(/!\[Vẽ Ảnh\]\((.*?)\)/g, function(match, url) {
                    const seed = Math.floor(Math.random() * 999999);
                    const finalUrl = url.includes('seed=') ? url : `${url}&seed=${seed}`;
                    return `<div class="ai-img-frame"><div class="img-loading">🎨 Đang rửa ảnh...</div><img src="${finalUrl}" onload="this.previousSibling.style.display='none'" onerror="this.src='https://via.placeholder.com/500?text=Lỗi+mạng+rồi+Sếp+ơi'"></div>`;
                });

                const avatar = m.role === 'assistant' ? `<div class="chat-avatar">${activeProvider === 'cyh' ? '🏀' : '💅'}</div>` : '';
                row.innerHTML = `${avatar}<div class="bubble">${html}</div>`;
                box.appendChild(row);
            });
            box.parentElement.scrollTop = box.parentElement.scrollHeight;
        }

        async function talk() {
            const val = input.value.trim(); if (!val) return;
            input.value = ''; input.style.height = 'auto'; sendBtn.disabled = true;
            messages.push({ role: 'user', content: val }); render();
            thinkingUI.classList.add('active');

            try {
                let responseText = "";
                if (activeProvider === 'gii') {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${state.gii.id}:generateContent?key=${GOOGLE_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: SYSTEM_INSTRUCTIONS + "\n\nUser: " + val }] }] })
                    });
                    const d = await res.json();
                    responseText = d?.candidates?.[0]?.content?.parts?.[0]?.text || "Mị bị nấc cụt rồi Sếp ơi!";
                } else {
                    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                        method: "POST",
                        headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                        body: JSON.stringify({ model: state.cyh.id, messages: [{ role: "system", content: "Bạn là Trần Dịch Hằng, năng động vô tri. Dùng Markdown ảnh Pollinations nếu được nhờ vẽ." }, { role: "user", content: val }] })
                    });
                    const d = await res.json();
                    responseText = d?.choices?.[0]?.message?.content || "Hằng Hằng rớt bóng rổ rồi!";
                }
                messages.push({ role: 'assistant', content: responseText });
            } catch (e) {
                messages.push({ role: 'assistant', content: "🚨 Lỗi mạng rồi Sếp ơi! Kiểm tra WiFi hoặc tắt Tiết kiệm PIN nha!" });
            } finally { thinkingUI.classList.remove('active'); render(); sendBtn.disabled = false; }
        }

        input.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px'; sendBtn.disabled = !this.value.trim(); });
        input.addEventListener('keydown', (e) => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); talk(); } });
        render();
    </script>
</body>
</html>
