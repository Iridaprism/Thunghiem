<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cloyveh Codex — Iridaprism V4.0</title>
<script>(function(){try{let c=JSON.parse(localStorage.getItem('Cloyveh_Theme'));if(c&&c.length>0){let g=c.length===1?`linear-gradient(135deg,${c[0]}dd,${c[0]},${c[0]}ee)`:`linear-gradient(135deg,${c.join(',')})`;let s=document.createElement('style');s.innerHTML=`body{background:${g}!important;background-size:300% 300%!important;animation:bgShift 25s ease infinite!important;}`;document.head.appendChild(s);}}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="Base.css">
<style>
/* ── LAYOUT ── */
.app-wrap {
    width: 100%; max-width: 820px; margin: 0 auto;
    padding: 0 clamp(14px,3.5vw,24px) 70px;
    display: flex; flex-direction: column;
    gap: clamp(16px,4vw,24px);
    position: relative; z-index: 10;
}

/* ── HEADER ── */
header {
    text-align: center;
    padding: clamp(28px,7vw,50px) 0 clamp(6px,2vw,12px);
    animation: fadeDown .9s var(--silk);
}
.logo-img {
    width: clamp(120px,30vw,162px); height: auto;
    filter: drop-shadow(0 6px 24px rgba(167,139,250,.5))
            drop-shadow(0 0 48px rgba(244,114,182,.2));
    animation: float 6s ease-in-out infinite;
    margin-bottom: -6px;
}
h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.45rem,5.5vw,2.4rem);
    font-weight: 900;
    background: linear-gradient(90deg,
        #7c3aed, #a78bfa, #38bdf8, #34d399,
        #f472b6, #c084fc, #7c3aed);
    background-size: 400% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 7s linear infinite;
    filter: drop-shadow(0 0 14px rgba(167,139,250,.5));
    line-height: 1.2; margin-bottom: 6px;
}
.subtitle {
    color: var(--ink3); font-weight: 800;
    font-size: clamp(.85rem,2.8vw,.98rem);
    opacity: .88;
    text-shadow: 0 1px 6px rgba(67,56,202,.1);
}

/* ── API KEY BUTTON ── */
.btn-apikey {
    position: fixed;
    top: clamp(10px,3vw,15px); right: clamp(10px,3vw,15px);
    z-index: 50;
    background: linear-gradient(135deg,
        rgba(254,215,170,.6), rgba(253,186,116,.58));
    backdrop-filter: blur(20px);
    border: 2px solid rgba(251,191,36,.5);
    color: #78350f; font-weight: 900;
    font-size: clamp(.76rem,2.5vw,.9rem);
    padding: 10px 16px; border-radius: 16px;
    box-shadow: 0 4px 22px rgba(251,191,36,.22),
                inset 0 1px 0 rgba(255,255,255,.3);
    will-change: transform, box-shadow;
    transform: translateZ(0);
    transition: transform .35s var(--silk), box-shadow .35s var(--silk);
}
.btn-apikey:hover {
    box-shadow: 0 0 14px rgba(251,191,36,.65),
                0 0 30px rgba(251,191,36,.3);
    transform: translateY(-2px) translateZ(0);
}
.btn-apikey:active {
    transform: scale(.93) translateZ(0) !important;
    transition: transform .07s var(--snap) !important;
}

/* ── ACTION BUTTONS ── */
.actions-row {
    display: flex; flex-direction: column;
    align-items: center; gap: 13px;
}
.btn-mega {
    width: 100%; max-width: 440px;
    padding: clamp(15px,4vw,20px) 30px;
    font-size: clamp(.98rem,3.5vw,1.14rem); font-weight: 900;
    border-radius: 22px;
    background: linear-gradient(135deg,
        rgba(167,243,208,.55), rgba(110,231,183,.48), rgba(56,189,248,.38));
    backdrop-filter: blur(22px);
    border: 2px solid rgba(52,211,153,.5);
    color: #065f46;
    box-shadow: 0 8px 30px rgba(52,211,153,.2),
                inset 0 1px 0 rgba(255,255,255,.3);
    will-change: transform, box-shadow;
    transform: translateZ(0);
    transition: transform .35s var(--silk), box-shadow .35s var(--silk);
    letter-spacing: .015em;
}
.btn-mega:hover {
    box-shadow: var(--gm), 0 10px 36px rgba(52,211,153,.28);
}
.btn-mega.blue {
    background: linear-gradient(135deg,
        rgba(186,230,253,.55), rgba(125,211,252,.45), rgba(196,181,253,.38));
    color: #1e3a5f;
    border-color: rgba(56,189,248,.5);
    box-shadow: 0 8px 30px rgba(56,189,248,.2),
                inset 0 1px 0 rgba(255,255,255,.3);
}
.btn-mega.blue:hover {
    box-shadow: var(--go), 0 10px 36px rgba(56,189,248,.28);
}

.file-label {
    width: 100%; max-width: 440px;
    padding: clamp(13px,3.5vw,17px) 32px;
    font-size: clamp(.93rem,3vw,1.05rem); font-weight: 900;
    border-radius: 22px;
    background: linear-gradient(135deg,
        rgba(233,213,255,.55), rgba(216,180,254,.48), rgba(244,114,182,.28));
    backdrop-filter: blur(22px);
    border: 2px solid rgba(192,132,252,.5);
    color: #4a1d96;
    box-shadow: 0 8px 30px rgba(168,85,247,.18),
                inset 0 1px 0 rgba(255,255,255,.3);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    will-change: transform, box-shadow;
    transform: translateZ(0);
    transition: transform .35s var(--silk), box-shadow .35s var(--silk);
    letter-spacing: .015em;
    overflow: hidden; position: relative;
}
.file-label::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(105deg,
        transparent 35%, rgba(255,255,255,.2) 50%, transparent 65%);
    background-size: 200% 100%;
    background-position: -100% 0;
    transition: background-position .5s var(--silk);
    pointer-events: none;
}
.file-label:hover::after { background-position: 200% 0; }
.file-label:hover { box-shadow: var(--gp); }
.file-label:active {
    transform: scale(.93) translateZ(0) !important;
    transition: transform .07s var(--snap) !important;
}
input[type=file] { display: none; }

/* ── VAULT SECTION ── */
.vault-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 2px; margin-bottom: 16px;
}
.vault-header h2 {
    font-family: 'Orbitron', monospace;
    color: var(--ink); font-weight: 700;
    font-size: clamp(.92rem,3.5vw,1.18rem);
    text-shadow: 0 0 20px rgba(124,58,237,.28);
    letter-spacing: .02em;
}
.btn-clear {
    background: linear-gradient(135deg,
        rgba(254,202,202,.55), rgba(252,165,165,.5));
    color: #991b1b; padding: 8px 18px;
    border: 2px solid rgba(248,113,113,.45);
    font-size: clamp(.78rem,2.5vw,.9rem);
    border-radius: 14px; font-weight: 800;
    box-shadow: 0 4px 12px rgba(239,68,68,.1);
    will-change: transform, box-shadow;
    transform: translateZ(0);
    transition: transform .35s var(--silk), box-shadow .35s var(--silk);
}
.btn-clear:hover {
    box-shadow: 0 0 12px rgba(239,68,68,.55),
                0 0 28px rgba(239,68,68,.25);
}

/* ── MEMORY CARDS ── */
.memory-list {
    display: flex; flex-direction: column;
    gap: 14px; padding-bottom: 20px;
}
.memory-item {
    position: relative;
    display: flex; flex-direction: column; gap: 6px;
    padding: clamp(16px,4vw,22px) clamp(14px,4vw,22px);
    padding-right: 66px;
    background: linear-gradient(135deg,
        rgba(238,232,255,.65), rgba(219,234,254,.58), rgba(236,252,255,.6));
    border: 1.5px solid rgba(196,181,253,.38);
    border-radius: 26px;
    box-shadow: var(--shadow-card);
    cursor: pointer;
    will-change: transform, box-shadow;
    transform: translateZ(0);
    transition: transform .38s var(--silk), box-shadow .38s var(--silk);
    overflow: hidden;
}

/* Rainbow top accent */
.memory-item::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg,
        #7c3aed,#c084fc,#38bdf8,#34d399,#f472b6,#fbbf24,#7c3aed);
    background-size: 400% auto;
    animation: borderFlow 6s linear infinite;
    border-radius: 26px 26px 0 0;
}

/* Shimmer overlay on hover */
.memory-item::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(105deg,
        transparent 30%,
        rgba(255,255,255,.12) 50%,
        transparent 70%);
    background-size: 250% 100%;
    background-position: -100% 0;
    border-radius: 26px;
    transition: background-position .6s var(--silk);
    pointer-events: none;
}
.memory-item:hover::after { background-position: 200% 0; }

.memory-item:hover {
    transform: translateY(-5px) translateZ(0) !important;
    box-shadow: var(--shadow-card-hover);
}
.memory-item:active {
    transform: scale(.96) translateZ(0) !important;
    transition: transform .08s var(--snap) !important;
}

.mem-date {
    font-size: clamp(.74rem,2.4vw,.84rem);
    color: var(--v); font-weight: 700; opacity: .88;
    letter-spacing: .01em;
}
.mem-title {
    font-size: clamp(.98rem,3.5vw,1.16rem);
    color: var(--ink); font-weight: 900;
    white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis;
    text-shadow: 0 1px 4px rgba(124,58,237,.08);
}
.mem-del {
    position: absolute; top: 50%; right: 14px;
    transform: translateY(-50%);
    background: linear-gradient(135deg,
        rgba(254,202,202,.88), rgba(252,165,165,.82));
    border: 2px solid rgba(248,113,113,.5);
    border-radius: 14px; color: #991b1b;
    width: clamp(36px,9vw,42px); height: clamp(36px,9vw,42px);
    font-size: 1.1rem; font-weight: 900;
    box-shadow: 0 3px 12px rgba(239,68,68,.16);
    will-change: transform, box-shadow;
    transition: transform .3s var(--silk), box-shadow .3s var(--silk);
}
.mem-del:hover {
    box-shadow: 0 0 14px rgba(239,68,68,.65) !important;
    transform: translateY(-50%) scale(1.1) translateZ(0) !important;
}
.mem-del:active {
    transform: translateY(-50%) scale(.9) translateZ(0) !important;
    transition: transform .07s var(--snap) !important;
}

/* ── MODALS ── */
.overlay-bg {
    position: fixed; inset: 0; z-index: 100;
    opacity: 0; visibility: hidden;
    background: rgba(20,15,55,.48);
    backdrop-filter: blur(16px) saturate(1.4);
    -webkit-backdrop-filter: blur(16px) saturate(1.4);
    display: flex; justify-content: center; align-items: center;
    padding: 16px;
    transition: opacity .3s var(--silk), visibility .3s;
    will-change: opacity;
}
.overlay-bg.active { opacity: 1; visibility: visible; }

.modal-box {
    width: 100%; max-width: 440px;
    border-radius: 30px;
    padding: clamp(22px,6vw,28px) clamp(16px,5vw,24px);
    background: linear-gradient(148deg,
        rgba(238,232,255,.95), rgba(224,242,254,.92), rgba(236,253,245,.95));
    border: 2px solid rgba(196,181,253,.5);
    backdrop-filter: blur(40px);
    box-shadow: var(--shadow-modal);
    display: flex; flex-direction: column; gap: 13px;
    transform: scale(.85) translateY(30px) translateZ(0);
    opacity: 0;
    transition: transform .42s var(--spring), opacity .3s var(--silk);
    will-change: transform, opacity;
}
.overlay-bg.active .modal-box {
    transform: scale(1) translateY(0) translateZ(0);
    opacity: 1;
}
.modal-box h3 {
    font-family: 'Orbitron', monospace; color: var(--ink);
    text-align: center; font-size: clamp(1rem,4vw,1.28rem);
    font-weight: 700; letter-spacing: .02em;
    text-shadow: 0 0 18px rgba(124,58,237,.2);
}

.mrow { display: flex; gap: 10px; }
.mbtn {
    padding: 13px; border-radius: 16px;
    font-weight: 900; font-size: .97rem;
    background: linear-gradient(135deg,
        rgba(238,242,255,.85), rgba(224,242,254,.8));
    color: var(--ink);
    border: 1.5px solid rgba(196,181,253,.45);
    box-shadow: 0 3px 12px rgba(99,102,241,.09),
                inset 0 1px 0 rgba(255,255,255,.4);
    cursor: pointer; touch-action: manipulation;
    will-change: transform, box-shadow;
    transform: translateZ(0);
    transition: transform .3s var(--silk), box-shadow .3s var(--silk);
    width: 100%;
}
.mbtn:active { transform: scale(.93) translateZ(0) !important; }
.mbtn:hover { box-shadow: 0 0 14px rgba(192,132,252,.5); }
.mbtn-del {
    background: linear-gradient(135deg,
        rgba(254,202,202,.88), rgba(252,165,165,.82)) !important;
    color: #991b1b !important;
    border-color: rgba(248,113,113,.5) !important;
}
.mbtn-del:hover {
    box-shadow: 0 0 12px rgba(239,68,68,.55) !important;
}

/* ── TAB ROW ── */
.tab-row {
    display: flex; gap: 6px;
    background: rgba(238,242,255,.64);
    padding: 5px; border-radius: 16px;
    border: 1.5px solid rgba(196,181,253,.38);
}
.tab-btn {
    flex: 1; padding: 10px 0; border-radius: 12px;
    background: transparent; font-weight: 800;
    color: var(--ink3); border: none !important;
    box-shadow: none !important; cursor: pointer;
    font-size: .9rem; touch-action: manipulation;
    transition: background .3s var(--silk), color .2s, box-shadow .3s;
    will-change: transform; transform: translateZ(0);
}
.tab-btn.active {
    background: linear-gradient(135deg,
        rgba(238,242,255,.92), rgba(224,242,254,.88)) !important;
    color: var(--v) !important;
    box-shadow: 0 4px 14px rgba(99,102,241,.18) !important;
}

/* ── MISC ── */
.session-item {
    background: linear-gradient(135deg,
        rgba(238,242,255,.64), rgba(224,242,254,.58));
    border: 1.5px solid rgba(196,181,253,.38);
    border-radius: 20px; padding: 15px; margin-bottom: 10px;
}
.session-name {
    font-size: .88rem; color: var(--ink2);
    font-weight: 700; line-height: 1.5;
}
.saved-list {
    max-height: calc(100vh - 240px);
    overflow-y: auto; padding: 0 4px 10px;
}
.mini-input {
    width: 100%;
    background: linear-gradient(135deg,
        rgba(243,232,255,.65), rgba(238,232,255,.58));
    border: 2px solid rgba(196,181,253,.5);
    border-radius: 16px; padding: 11px 16px;
    font-size: .98rem; font-weight: 700;
    color: var(--ink); outline: none;
    transition: border-color .3s var(--silk), box-shadow .3s var(--silk);
    will-change: box-shadow; transform: translateZ(0);
}
.mini-input:focus {
    border-color: rgba(124,58,237,.65);
    box-shadow: 0 0 0 4px rgba(167,139,250,.18),
                0 4px 20px rgba(124,58,237,.1);
}
</style>
</head>
<body>
<!-- Bottom-left accent orb -->
<div style="position:fixed;bottom:8vh;left:-5vw;width:clamp(160px,32vw,300px);height:clamp(160px,32vw,300px);background:radial-gradient(circle,rgba(52,211,153,.18) 0%,rgba(56,189,248,.13) 50%,transparent 75%);border-radius:50%;animation:orbPulse2 22s ease-in-out infinite;pointer-events:none;z-index:0;will-change:transform,opacity;"></div>

<button class="btn-apikey" onclick="openApiModal()">🔑 Cài API Key</button>

<div class="app-wrap">
  <header>
    <div>
      <img src="Logo167.png" alt="Logo" class="logo-img" onerror="this.style.display='none'">
      <h1>Cloyveh Codex</h1>
    </div>
    <p class="subtitle">Thế giới số mềm mại, nhân văn ✨</p>
  </header>

  <div class="actions-row">
    <button class="btn-mega" onclick="location.href='TaoKyUc.html'">📚 Tạo ký ức mới nè</button>
    <button class="btn-mega blue" onclick="openMore()">✨ Coi thêm nè</button>
    <label class="file-label">📁 Ném tệp .txt vô đây<input type="file" id="fileInput" accept="*/*"></label>
  </div>

  <div>
    <div class="vault-header">
      <h2>🗂️ Ngăn kéo thời gian</h2>
      <button class="btn-clear" onclick="clearAll()">🗑️ Dọn dẹp</button>
    </div>
    <div class="memory-list" id="memList"></div>
  </div>
</div>

<!-- MORE MODAL -->
<div class="overlay-bg" id="moreModal">
  <div class="modal-box">
    <h3>✨ Khám phá thêm</h3>
    <button class="mbtn" style="background:linear-gradient(135deg,rgba(167,243,208,.55),rgba(110,231,183,.5));color:#065f46;border-color:rgba(52,211,153,.5);" onclick="go('KhoLuu.html')">🗄️ Kho Lưu Trữ Tối Mật</button>
    <button class="mbtn" style="background:linear-gradient(135deg,#c4b5fd,#a78bfa,#7c3aed);color:rgba(245,240,255,.97);border:none;" onclick="closeMore();openLinh()">🌈 Ống kính Linh Ly</button>
    <button class="mbtn" style="background:linear-gradient(135deg,#67e8f9,#22d3ee,#0891b2);color:#082f49;border:none;" onclick="go('Tim.html')">🔍 Kính chiếu yêu (Tìm)</button>
    <button class="mbtn" style="background:linear-gradient(135deg,#c084fc,#a855f7,#7c3aed);color:rgba(245,240,255,.97);border:none;" onclick="go('Studio.html')">🎨 Studio Sáng Tạo</button>
    <button class="mbtn mbtn-del" onclick="closeMore()">Đóng</button>
  </div>
</div>

<!-- LINH LY -->
<div class="overlay-bg" id="linhModal">
  <div class="modal-box">
    <h3>Vui lòng nhập mã màu 🎨</h3>
    <input class="mini-input" id="hex1" placeholder="Mã 1 (Bắt buộc) VD: #ff00ff" style="border-color:#d8b4fe">
    <input class="mini-input" id="hex2" placeholder="Mã 2 (Tùy chọn)" style="border-color:#d8b4fe">
    <input class="mini-input" id="hex3" placeholder="Mã 3 (Tùy chọn)" style="border-color:#d8b4fe">
    <input class="mini-input" id="hex4" placeholder="Mã 4 (Tùy chọn)" style="border-color:#d8b4fe">
    <div class="mrow">
      <button class="mbtn" style="background:linear-gradient(135deg,#34d399,#10b981);color:#022c22;border:none;" onclick="saveLinhLy()">Lưu</button>
      <button class="mbtn mbtn-del" onclick="document.getElementById('linhModal').classList.remove('active')">Đóng</button>
    </div>
    <button class="mbtn" style="background:linear-gradient(135deg,rgba(226,232,240,.75),rgba(203,213,225,.65));color:#374151;border:1.5px solid rgba(148,163,184,.45)" onclick="resetLinh()">Quay lại mặc định</button>
  </div>
</div>

<!-- API KEY -->
<div class="overlay-bg" id="apiModal">
  <div class="modal-box" style="background:linear-gradient(148deg,rgba(254,240,138,.97),rgba(253,224,71,.92));border-color:rgba(251,191,36,.55)">
    <h3 style="color:#451a03">Nhập API Key vào đây nè</h3>
    <div style="position:relative">
      <input type="password" id="apiKeyVal" class="mini-input" placeholder="API Key............." style="border-color:rgba(251,191,36,.58);padding-right:50px">
      <button onclick="toggleApiEye()" id="eyeBtn" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.3rem;color:#78350f;transition:transform .2s var(--spring)">👁️</button>
    </div>
    <div class="mrow">
      <button class="mbtn mbtn-del" onclick="document.getElementById('apiModal').classList.remove('active')">Đóng</button>
      <button class="mbtn" style="background:linear-gradient(135deg,#67e8f9,#22d3ee,#0891b2);color:#082f49;border:none;" onclick="saveApi()">Lưu</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">✨ Thông báo</div>
<script>
const MK='Cloyveh_Codex_V2',AK='Cloyveh_API_Key';
function getM(){return JSON.parse(localStorage.getItem(MK)||'[]');}
function setM(m){localStorage.setItem(MK,JSON.stringify(m));}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500);}
function go(url){closeMore();location.href=url;}
function renderMemory(){
    const list=document.getElementById('memList'),mems=getM();
    if(!mems.length){list.innerHTML='<div style="text-align:center;padding:24px;font-weight:800;color:#64748b;background:rgba(248,250,252,.55);border-radius:18px;border:2px dashed rgba(148,163,184,.4)">Trống trơn... Nhập liệu đi Sếp iu! 🌸</div>';return;}
    list.innerHTML='';
    mems.forEach(m=>{
        const d=document.createElement('div');
        d.className='memory-item';d.onclick=()=>openEdit(m.id);
        d.innerHTML=`<button class="mem-del" onclick="delMem(event,${m.id})">✕</button><div class="mem-date">${m.date} • ${m.time}</div><div class="mem-title">${m.title.replace(/</g,'&lt;')}</div>`;
        list.appendChild(d);
    });
}
function openEdit(id){sessionStorage.setItem('CC_EditId',id);location.href='CapNhat.html';}
function delMem(e,id){e.stopPropagation();setM(getM().filter(m=>m.id!==id));renderMemory();toast('Đã bay màu! 💨');}
function clearAll(){if(!getM().length)return;if(confirm('Xóa trắng bóc luôn hả Sếp? 💔')){localStorage.removeItem(MK);renderMemory();}}
document.getElementById('fileInput').addEventListener('change',function(e){
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=function(ev){const mems=getM(),now=new Date();mems.unshift({id:Date.now(),title:file.name,content:ev.target.result,date:`${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()}`,time:`${now.getHours()}:${now.getMinutes()}`});setM(mems);renderMemory();toast('Đã nạp file! 📁');};
    r.readAsText(file,'utf-8');e.target.value='';
});
function openMore(){document.getElementById('moreModal').classList.add('active');}
function closeMore(){document.getElementById('moreModal').classList.remove('active');}
function openLinh(){document.getElementById('linhModal').classList.add('active');}
function saveLinhLy(){const h=['hex1','hex2','hex3','hex4'].map(id=>document.getElementById(id).value.trim()).filter(Boolean);if(!h.length||!h.every(x=>/^#([0-9A-Fa-f]{3}|[0-9A-Fa-f]{6})$/.test(x))){toast('Mã màu không hợp lệ! ❌');return;}localStorage.setItem('Cloyveh_Theme',JSON.stringify(h));document.getElementById('linhModal').classList.remove('active');if(confirm('Màu đẹp! Tải lại trang để áp dụng không?'))location.reload();}
function resetLinh(){localStorage.removeItem('Cloyveh_Theme');location.reload();}
function openApiModal(){document.getElementById('apiKeyVal').value=localStorage.getItem(AK)||'';document.getElementById('apiModal').classList.add('active');}
function saveApi(){localStorage.setItem(AK,document.getElementById('apiKeyVal').value.trim());toast('Ghim API Key rùi Nữ Vương! 💅');document.getElementById('apiModal').classList.remove('active');}
function toggleApiEye(){const i=document.getElementById('apiKeyVal'),b=document.getElementById('eyeBtn');if(i.type==='password'){i.type='text';b.textContent='🙈';}else{i.type='password';b.textContent='👁️';}}
window.onload=renderMemory;
</script>
</body>
</html>
