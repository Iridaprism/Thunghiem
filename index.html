<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rapaseos Studio · Nữ Chủ Tịch Tử Tử</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* =========================================
           STYLE ĐẲNG CẤP HOÀNG GIA - CHÍNH XÁC 100% 💅👑
           ========================================= */
        :root {
            --primary: #00FF87;
            --secondary: #60EFFF;
            --accent: #FF3B6B;
            --bg: #020410;
            --glass: rgba(15, 12, 35, 0.85);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: #E6E8FF; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 15px; overflow-x: hidden; }

        /* Hiệu ứng nền vũ trụ */
        .bg-stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #1a1a3a 0%, #020410 100%); z-index: -2; }
        .bg-glow { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100vw; height: 100vw; background: radial-gradient(circle, rgba(0, 255, 135, 0.08) 0%, transparent 65%); z-index: -1; pointer-events: none; }

        .container { width: 100%; max-width: 500px; z-index: 10; margin-top: 10px; animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Header */
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 32px; font-weight: 900; background: linear-gradient(135deg, var(--primary), var(--secondary), #FFD700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 25px rgba(0, 255, 135, 0.4); letter-spacing: -1px; }
        .header p { color: #A0A8D8; font-size: 13px; font-weight: 700; opacity: 0.9; margin-top: 5px; text-transform: uppercase; letter-spacing: 1.5px; }

        /* Bảng Điều Khiển */
        .control-panel { background: var(--glass); backdrop-filter: blur(25px); border: 1.5px solid var(--border); border-radius: 30px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); margin-bottom: 30px; }

        .input-group { margin-bottom: 20px; }
        label { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 900; color: var(--primary); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
        
        textarea { width: 100%; background: rgba(0,0,0,0.6); border: 1.5px solid var(--border); color: white; padding: 18px 20px; border-radius: 20px; outline: none; transition: 0.3s; font-size: 15px; resize: vertical; min-height: 120px; line-height: 1.6; }
        textarea:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(0, 255, 135, 0.2); background: rgba(0,0,0,0.8); }
        textarea::placeholder { color: #4B5563; font-style: italic; }

        /* Nút Triệu Hồi */
        .btn-summon { width: 100%; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #030008; border: none; padding: 20px; border-radius: 22px; font-size: 17px; font-weight: 900; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; text-transform: uppercase; box-shadow: 0 10px 25px rgba(0, 255, 135, 0.3); letter-spacing: 1px; }
        .btn-summon:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(0, 255, 135, 0.5); }
        .btn-summon:active:not(:disabled) { transform: scale(0.97); }
        .btn-summon:disabled { background: #1A2145; color: #4B5563; cursor: not-allowed; transform: none; box-shadow: none; }

        /* Khung Tranh */
        .result-stage { width: 100%; min-height: 380px; background: rgba(0, 0, 0, 0.5); border-radius: 30px; border: 2.5px dashed rgba(255, 255, 255, 0.08); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; padding: 10px; transition: 0.4s; }
        .result-stage.active { border-style: solid; border-color: var(--primary); box-shadow: 0 0 40px rgba(0, 255, 135, 0.15); }

        .empty-icon { text-align: center; opacity: 0.3; }
        .empty-icon i { width: 60px; height: 60px; margin-bottom: 10px; color: var(--primary); }

        .loading-box { display: none; flex-direction: column; align-items: center; gap: 15px; color: var(--primary); z-index: 20; text-align: center; width: 90%; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(0, 255, 135, 0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .error-msg { display: none; color: var(--accent); text-align: center; padding: 30px; background: rgba(255, 59, 107, 0.1); border-radius: 25px; border: 1.5px solid var(--accent); width: 95%; }
        .error-msg p { font-size: 13px; font-family: monospace; line-height: 1.5; margin-bottom: 8px;}

        .final-img { display: none; width: 100%; height: auto; border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); object-fit: contain; animation: imgReveal 0.8s cubic-bezier(0.23, 1, 0.32, 1); }
        @keyframes imgReveal { from { opacity: 0; transform: scale(0.9); filter: blur(10px); } to { opacity: 1; transform: scale(1); filter: blur(0); } }

        /* Nút Tải Ảnh */
        .action-area { display: none; width: 100%; padding: 20px 0; justify-content: center; }
        .btn-download { background: rgba(0, 255, 135, 0.1); border: 2px solid var(--primary); color: var(--primary); padding: 15px 40px; border-radius: 20px; font-weight: 900; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.3s; text-decoration: none; font-size: 14px; letter-spacing: 1px; }
        .btn-download:hover { background: var(--primary); color: #030008; box-shadow: 0 0 30px rgba(0, 255, 135, 0.4); transform: translateY(-2px); }

        .footer-tip { font-size: 11px; color: #7F8ACF; margin-top: 15px; text-align: center; font-style: italic; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="bg-stars"></div>
    <div class="bg-glow"></div>

    <div class="container">
        <div class="header">
            <h1><i data-lucide="sparkles"></i> RAPASEOS STUDIO</h1>
            <p>Sức Mạnh Tối Thượng FLUX.1</p>
        </div>

        <div class="control-panel">
            <div class="input-group">
                <label><i data-lucide="palette"></i> Ý tưởng của Sếp:</label>
                <textarea id="prompt-in" placeholder="Sếp muốn vẽ gì nè? Nếu để trống, Mị sẽ tự động phác họa Cá Heo Hồng siêu thực luôn nha! 🐬✨"></textarea>
            </div>

            <button class="btn-summon" id="btn-draw" onclick="startGeneration()">
                <i data-lucide="wand-2"></i> Kích Hoạt Triệu Hồi
            </button>
            <p class="footer-tip">Chìa khóa VIP đã được nhúng an toàn vào hệ thống.</p>
        </div>

        <div class="result-stage" id="result-box">
            <!-- Trạng thái trống -->
            <div class="empty-icon" id="empty-ui">
                <i data-lucide="image-plus"></i>
                <p style="font-size: 13px; font-weight: 800; color: #7F8ACF; margin-top: 10px;">Đang đợi lệnh từ Nữ chủ tịch...</p>
            </div>

            <!-- Trạng thái Loading -->
            <div class="loading-box" id="loading-ui">
                <div class="spinner"></div>
                <p id="loading-txt" style="font-size: 14px; font-weight: 900; letter-spacing: 1.5px; color: var(--primary);">ĐANG CHẾ TÁC ẢNH...</p>
                <p id="loading-sub" style="font-size: 11px; color: #A0A8D8; font-style: italic; margin-top: 5px;">Hệ thống đang chạy hết công suất!</p>
            </div>

            <!-- Trạng thái Lỗi -->
            <div class="error-msg" id="error-ui">
                <h4 style="margin-bottom: 10px; color: var(--accent);"><i data-lucide="shield-x"></i> HỆ THỐNG BÁO LỖI</h4>
                <p id="error-txt"></p>
            </div>

            <!-- Trạng thái Hiện Ảnh -->
            <img id="final-art" class="final-img" alt="Tác phẩm của Sếp">
        </div>

        <div class="action-area" id="action-ui">
            <a id="download-link" class="btn-download" download="KietTac_Cua_Sep.jpg">
                <i data-lucide="download"></i> LỤM VỀ BỘ SƯU TẬP
            </a>
        </div>
    </div>

    <script>
        // Khởi tạo icon
        lucide.createIcons();

        // 🧠 CHÌA KHÓA BÍ MẬT ĐÃ ĐƯỢC CHỐT CHẶT
        const API_KEY = "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";
        const MODEL_URL = "https://api-inference.huggingface.co/models/black-forest-labs/FLUX.1-schnell";

        // Hàm đợi (Dùng cho tính năng tự động gọi lại)
        const delay = (ms) => new Promise(res => setTimeout(res, ms));

        async function startGeneration() {
            let prompt = document.getElementById('prompt-in').value.trim();

            // 🔥 TÍNH NĂNG ĐẶC QUYỀN: AUTO CÁ HEO HỒNG
            if (!prompt) {
                prompt = "A majestic neon pink dolphin gracefully jumping through a sparkling cosmic space ocean, cyberpunk city background, glowing neon lights, 8k resolution, cinematic lighting, masterpiece, highly detailed";
                document.getElementById('prompt-in').value = "Đang vẽ Cá Heo Hồng cực phẩm cho Sếp... 🐬✨";
            }

            // Giao diện
            const btn = document.getElementById('btn-draw');
            const loadingUI = document.getElementById('loading-ui');
            const errorUI = document.getElementById('error-ui');
            const resultBox = document.getElementById('result-box');
            const finalImg = document.getElementById('final-art');
            const emptyUI = document.getElementById('empty-ui');
            const actionUI = document.getElementById('action-ui');
            const loadingTxt = document.getElementById('loading-txt');
            const loadingSub = document.getElementById('loading-sub');

            // Reset UI
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader" class="spin" style="animation: spin 2s linear infinite;"></i> ĐANG VẼ...';
            lucide.createIcons();
            
            errorUI.style.display = 'none';
            emptyUI.style.display = 'none';
            finalImg.style.display = 'none';
            actionUI.style.display = 'none';
            resultBox.classList.remove('active');
            loadingUI.style.display = 'flex';
            
            loadingTxt.innerText = "ĐANG CHẾ TÁC ẢNH...";
            loadingSub.innerText = "Chạy trên GitHub Pages bao mượt, Sếp chờ xíu nha!";

            let retries = 10; // Cố gắng gõ cửa 10 lần nếu máy chủ HuggingFace đang ngủ
            let imageBlob = null;

            try {
                // VÒNG LẶP AUTO-WAKEUP (TỰ ĐỘNG GỌI ĐỘNG CƠ DẬY)
                while (retries > 0) {
                    const response = await fetch(MODEL_URL, {
                        method: 'POST',
                        headers: { 
                            'Authorization': `Bearer ${API_KEY}`,
                            'Content-Type': 'application/json' 
                        },
                        body: JSON.stringify({ inputs: prompt })
                    });

                    if (response.ok) {
                        imageBlob = await response.blob();
                        break; // Có hình rồi thì thoát vòng lặp
                    } 
                    
                    const errorData = await response.json().catch(() => ({}));
                    
                    // Nếu lỗi do máy đang ngủ gật (model is loading)
                    if (errorData.error && errorData.error.includes("loading")) {
                        loadingTxt.innerText = "ĐỘNG CƠ ĐANG KHỞI ĐỘNG...";
                        loadingSub.innerText = `Sếp ráng đợi xíu, hệ thống đang tự động gọi máy dậy (Còn ${retries} lần thử)... 🚀`;
                        retries--;
                        await delay(5000); // Chờ 5 giây rồi gõ cửa lại
                    } else {
                        // Lỗi thật sự, không phải do ngủ gật
                        throw new Error(errorData.error || `Lỗi không xác định HTTP ${response.status}`);
                    }
                }

                // Nếu thử hết 10 lần vẫn không được
                if (!imageBlob) {
                    throw new Error("Động cơ hôm nay đình công rồi Sếp ơi, gọi hoài không dậy! Sếp thử lại sau nha! 😭");
                }

                // Lên hình!
                const imageUrl = URL.createObjectURL(imageBlob);
                finalImg.src = imageUrl;
                document.getElementById('download-link').href = imageUrl;
                
                loadingUI.style.display = 'none';
                finalImg.style.display = 'block';
                actionUI.style.display = 'flex';
                resultBox.classList.add('active');

            } catch (err) {
                loadingUI.style.display = 'none';
                errorUI.style.display = 'block';
                document.getElementById('error-txt').innerText = err.message;
            } finally {
                // Trả lại nút bấm
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="wand-2"></i> VẼ TIẾP TẤM NỮA';
                lucide.createIcons();
            }
        }
    </script>
</body>
</html>
